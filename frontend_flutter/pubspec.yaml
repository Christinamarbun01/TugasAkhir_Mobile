name: melon_detector
description: Melon Detection App using Mask RCNN
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  dio: ^5.4.0
  http: ^1.2.0
  http_parser: ^4.0.2
  
  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  
  # Utilities
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  image: ^4.1.7
  
  # Storage
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  launcher_name: ^1.0.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

launcher_name:
  default: "Melon Detection"
  id: "Melon Detection"


flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
